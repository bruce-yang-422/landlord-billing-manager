<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房東帳務管理工具</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

    <!-- 標題 -->
    <div class="header-section">
        <h1>🏠 房東帳務管理工具</h1>
        <div class="header-actions">
            <button class="btn-settings" onclick="toggleSettings()">⚙️ 房客設定</button>
            <div class="theme-selector">
                <label for="themeSelect">🎨</label>
                <select id="themeSelect" class="theme-select">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                    <option value="auto">Auto</option>
                </select>
            </div>
        </div>
    </div>

    <!-- 房客設定面板（預設隱藏） -->
    <div id="settingsPanel" class="settings-panel" style="display:none;">
        <h3>⚙️ 房客設定（長期記憶）</h3>
        <div class="units-grid">

            <!-- 5F 設定 -->
            <div class="unit-settings-card">
                <div class="unit-settings-title unit-5F">🏠 5 樓</div>
                <div class="settings-tabs">
                    <button class="settings-tab active" onclick="switchSettingsTab(this,'5F','basic')">基本資料</button>
                    <button class="settings-tab" onclick="switchSettingsTab(this,'5F','notes')">備註</button>
                </div>
                <!-- 基本資料 -->
                <div id="5F_tab_basic" class="settings-tab-panel">
                    <div class="grid-row">
                        <div>
                            <label>租金（元）</label>
                            <input type="number" id="5F_rent" placeholder="每月租金">
                        </div>
                        <div>
                            <label>居住人數</label>
                            <input type="number" id="5F_persons" value="1" min="1" placeholder="水費分攤人數">
                        </div>
                    </div>
                    <div class="grid-row">
                        <div>
                            <label>銀行代碼</label>
                            <input type="text" id="5F_bankCode" placeholder="例：007">
                        </div>
                        <div>
                            <label>戶名</label>
                            <input type="text" id="5F_payeeName" placeholder="收款人姓名">
                        </div>
                    </div>
                    <div>
                        <label>銀行帳號</label>
                        <input type="text" id="5F_accountNumber" placeholder="銀行帳號">
                    </div>
                </div>
                <!-- 備註 -->
                <div id="5F_tab_notes" class="settings-tab-panel" style="display:none;">
                    <div>
                        <label>📝 租客備註（會顯示在 LINE 報表中）</label>
                        <textarea id="5F_tenantNote" rows="6" placeholder="例：請於每月5日前匯款，謝謝。"></textarea>
                    </div>
                    <div style="margin-top:14px;">
                        <label>🔒 房東備註（僅供自己記錄，不顯示給租客）</label>
                        <textarea id="5F_landlordNote" rows="6" placeholder="例：租約到期日 2026/12/31，押金 2 個月。"></textarea>
                    </div>
                </div>
            </div>

            <!-- 6F 設定 -->
            <div class="unit-settings-card">
                <div class="unit-settings-title unit-6F">🏠 6 樓</div>
                <div class="settings-tabs">
                    <button class="settings-tab active" onclick="switchSettingsTab(this,'6F','basic')">基本資料</button>
                    <button class="settings-tab" onclick="switchSettingsTab(this,'6F','notes')">備註</button>
                </div>
                <!-- 基本資料 -->
                <div id="6F_tab_basic" class="settings-tab-panel">
                    <div class="grid-row">
                        <div>
                            <label>租金（元）</label>
                            <input type="number" id="6F_rent" placeholder="每月租金">
                        </div>
                        <div>
                            <label>居住人數</label>
                            <input type="number" id="6F_persons" value="1" min="1" placeholder="水費分攤人數">
                        </div>
                    </div>
                    <div class="grid-row">
                        <div>
                            <label>銀行代碼</label>
                            <input type="text" id="6F_bankCode" placeholder="例：007">
                        </div>
                        <div>
                            <label>戶名</label>
                            <input type="text" id="6F_payeeName" placeholder="收款人姓名">
                        </div>
                    </div>
                    <div>
                        <label>銀行帳號</label>
                        <input type="text" id="6F_accountNumber" placeholder="銀行帳號">
                    </div>
                </div>
                <!-- 備註 -->
                <div id="6F_tab_notes" class="settings-tab-panel" style="display:none;">
                    <div>
                        <label>📝 租客備註（會顯示在 LINE 報表中）</label>
                        <textarea id="6F_tenantNote" rows="6" placeholder="例：請於每月5日前匯款，謝謝。"></textarea>
                    </div>
                    <div style="margin-top:14px;">
                        <label>🔒 房東備註（僅供自己記錄，不顯示給租客）</label>
                        <textarea id="6F_landlordNote" rows="6" placeholder="例：租約到期日 2026/12/31，押金 2 個月。"></textarea>
                    </div>
                </div>
            </div>

        </div>
        <div class="settings-actions">
            <button class="btn-save-settings" onclick="saveUnitSettings()">💾 儲存房客設定</button>
        </div>
    </div>

    <!-- 帳單日期 -->
    <div class="info-card">
        <label for="billDate">📅 帳單日期</label>
        <input type="date" id="billDate">
    </div>

    <!-- 台電帳單資訊（共用） -->
    <div class="fee-section">
        <div class="section-title">⚡ 台電帳單資訊（共用電號）</div>
        <div class="grid-row">
            <div>
                <label for="season">季節</label>
                <select id="season" class="season-select">
                    <option value="summer">☀️ 夏月（6～9 月）</option>
                    <option value="other">🌙 非夏月（其餘月份）</option>
                </select>
            </div>
        </div>
        <div class="grid-row">
            <div>
                <label for="taipowerBill">💵 台電帳單金額（元）</label>
                <input type="number" id="taipowerBill" placeholder="例：1258">
            </div>
            <div>
                <label for="taipowerUnits">📊 台電總度數（度）</label>
                <input type="number" id="taipowerUnits" placeholder="例：566">
            </div>
        </div>
        <div class="grid-row">
            <div>
                <label for="reading6Prev">🔢 6F 上期電表讀數</label>
                <input type="number" id="reading6Prev" placeholder="上期讀數">
            </div>
            <div>
                <label for="reading6Curr">🔢 6F 本期電表讀數</label>
                <input type="number" id="reading6Curr" placeholder="本期讀數">
            </div>
        </div>
        <!-- 電費分攤預覽 -->
        <div class="split-preview">
            <div class="split-preview-row">
                <span class="split-label unit-5F-text">5F 用電</span>
                <span id="usage5F" class="split-value">—</span>
                <span class="split-arrow">→</span>
                <span class="split-label">電費</span>
                <span id="elecFee5F" class="split-value split-amount">—</span>
            </div>
            <div class="split-preview-row">
                <span class="split-label unit-6F-text">6F 用電</span>
                <span id="usage6F" class="split-value">—</span>
                <span class="split-arrow">→</span>
                <span class="split-label">電費</span>
                <span id="elecFee6F" class="split-value split-amount">—</span>
            </div>
        </div>
        <div class="regulation-notice" style="margin-top:12px;">
            <div style="font-size:13px;color:#FF3B30;line-height:1.6;">
                🚨 <strong>113年7月15日起新制：</strong>向租客收取電費不得超過台電帳單平均單價，違規最高罰 50 萬元。
            </div>
        </div>
    </div>

    <!-- 水費（共用） -->
    <div class="fee-section">
        <div class="section-title">💧 水費（按人數分攤）</div>
        <div class="grid-row">
            <div>
                <label for="totalWater">💧 本期水費總額（元）</label>
                <input type="number" id="totalWater" placeholder="請輸入水費總額">
            </div>
        </div>
        <div class="split-preview">
            <div class="split-preview-row">
                <span class="split-label unit-5F-text">5F 水費</span>
                <span id="waterFee5F" class="split-value split-amount">—</span>
            </div>
            <div class="split-preview-row">
                <span class="split-label unit-6F-text">6F 水費</span>
                <span id="waterFee6F" class="split-value split-amount">—</span>
            </div>
        </div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:8px;">
            人數設定請至「⚙️ 房客設定」修改
        </div>
    </div>

    <!-- 兩戶帳單卡 -->
    <div class="units-grid">

        <!-- 5F 帳單 -->
        <div class="unit-bill-card unit-bill-5F">
            <div class="unit-bill-title unit-5F">🏠 5 樓帳單</div>
            <div class="unit-bill-preview">
                <div class="preview-row">
                    <span>租金</span>
                    <span class="preview-rent-5F preview-from-settings">（設定值）</span>
                </div>
                <div class="preview-row">
                    <span>電費</span>
                    <span id="elecFee5F_card" class="preview-from-calc">—</span>
                </div>
                <div class="preview-row">
                    <span>水費</span>
                    <span id="waterFee5F_card" class="preview-from-calc">—</span>
                </div>
            </div>
            <div class="unit-extra-fees">
                <div class="grid-row">
                    <div>
                        <label>🔥 瓦斯費（元）</label>
                        <input type="number" id="5F_gas" value="0" placeholder="0">
                    </div>
                    <div>
                        <label>🏢 管理費（元）</label>
                        <input type="number" id="5F_management" value="0" placeholder="0">
                    </div>
                </div>
                <div>
                    <label>📝 其他費用（元）</label>
                    <input type="number" id="5F_other" value="0" placeholder="0">
                </div>
            </div>
            <button class="btn-save-bill btn-5F" onclick="saveBill('5F')">💾 存檔 5F 帳單</button>
        </div>

        <!-- 6F 帳單 -->
        <div class="unit-bill-card unit-bill-6F">
            <div class="unit-bill-title unit-6F">🏠 6 樓帳單</div>
            <div class="unit-bill-preview">
                <div class="preview-row">
                    <span>租金</span>
                    <span class="preview-rent-6F preview-from-settings">（設定值）</span>
                </div>
                <div class="preview-row">
                    <span>電費</span>
                    <span id="elecFee6F_card" class="preview-from-calc">—</span>
                </div>
                <div class="preview-row">
                    <span>水費</span>
                    <span id="waterFee6F_card" class="preview-from-calc">—</span>
                </div>
            </div>
            <div class="unit-extra-fees">
                <div class="grid-row">
                    <div>
                        <label>🔥 瓦斯費（元）</label>
                        <input type="number" id="6F_gas" value="0" placeholder="0">
                    </div>
                    <div>
                        <label>🏢 管理費（元）</label>
                        <input type="number" id="6F_management" value="0" placeholder="0">
                    </div>
                </div>
                <div>
                    <label>📝 其他費用（元）</label>
                    <input type="number" id="6F_other" value="0" placeholder="0">
                </div>
            </div>
            <button class="btn-save-bill btn-6F" onclick="saveBill('6F')">💾 存檔 6F 帳單</button>
        </div>

    </div>

    <!-- 備份匯入匯出 -->
    <div class="btn-group">
        <button class="btn-export" onclick="exportData()">📤 備份資料 (JSON)</button>
        <button class="btn-import" onclick="document.getElementById('fileInput').click()">📥 匯入資料</button>
        <input type="file" id="fileInput" accept=".json" onchange="importData(this)">
    </div>

    <!-- LINE 報表 -->
    <div id="reportSection" style="display:none;" class="fee-section">
        <h3>📋 LINE 報表</h3>
        <div id="reportText" class="report-area"></div>
        <button class="copy-btn" onclick="copyReport()">📋 複製報表</button>
    </div>

    <!-- 歷史帳單記錄 -->
    <div class="history-section">
        <div class="history-header">
            <h3>📜 歷史帳單紀錄</h3>
            <div class="filter-row">
                <button class="filter-btn active" data-filter="all" onclick="setHistoryFilter('all')">全部</button>
                <button class="filter-btn" data-filter="5F" onclick="setHistoryFilter('5F')">5 樓</button>
                <button class="filter-btn" data-filter="6F" onclick="setHistoryFilter('6F')">6 樓</button>
            </div>
        </div>
        <div class="history-actions">
            <button class="btn-clear-history" onclick="clearHistory()">清空紀錄</button>
        </div>
        <div style="overflow-x:auto;">
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>樓層</th>
                        <th>用電量</th>
                        <th>總金額</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script src="js/data.js"></script>
<script src="js/units.js"></script>
<script src="js/calculation.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/theme.js"></script>
<script src="js/app.js"></script>
</body>
</html>
